<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="avatar.css">
</head>
<body>
  <!-- ── Background video layer (full-screen, pointer-events: none) ── -->
  <video
    class="bg-video"
    id="backgroundVideo"
    autoplay loop muted playsinline
    src=""
  ></video>
  <!-- Light warm overlay to blend video with UI -->
  <div class="bg-video-overlay"></div>

  <!-- Title bar (draggable) -->
  <div class="title-bar" id="titleBar">
    <span class="title-icon">🍅</span>
    <span class="title-text">番茄钟</span>
    <div class="title-actions">
      <button class="title-btn" id="btnMinimize" title="最小化">─</button>
      <button class="title-btn" id="btnClose" title="关闭到托盘">✕</button>
    </div>
  </div>

  <!-- Main content (floats above background video) -->
  <div class="container">
    <!-- Mode indicator -->
    <div class="mode-badge" id="modeBadge">🍅 工作中</div>

    <!-- Timer ring (frosted glass backdrop) -->
    <div class="timer-ring-container">
      <div class="timer-ring-backdrop"></div>
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90"/>
        <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="90"
                stroke-dasharray="565.49" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <span class="timer-minutes" id="timerMinutes">25</span>
        <span class="timer-colon">:</span>
        <span class="timer-seconds" id="timerSeconds">00</span>
      </div>
    </div>

    <!-- Snooze countdown label (shown during snooze) -->
    <div class="snooze-label" id="snoozeLabel" style="display:none">
      稍后提醒
    </div>

    <!-- Session counter -->
    <div class="session-info" id="sessionInfo">
      今日完成：<span id="todayCount">0</span> 个番茄
    </div>

    <!-- Control buttons -->
    <div class="controls">
      <button class="ctrl-btn btn-reset" id="btnReset" title="重置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button class="ctrl-btn btn-start" id="btnStart" title="开始">
        <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn btn-skip" id="btnSkip" title="跳过">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 4 15 12 5 20 5 4"/>
          <line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <!-- Settings panel -->
    <div class="settings-toggle" id="settingsToggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>设置</span>
    </div>

    <div class="settings-panel" id="settingsPanel" style="display:none">
      <div class="setting-item">
        <label>工作时长 <span id="workDurationLabel">25 分钟</span></label>
        <input type="range" id="workDuration" min="5" max="60" value="25" step="5">
      </div>
      <div class="setting-item">
        <label>休息时长 <span id="breakDurationLabel">5 分钟</span></label>
        <input type="range" id="breakDuration" min="1" max="30" value="5" step="1">
      </div>

      <!-- ── Alarm settings section ────────────────────────────── -->
      <div class="alarm-settings-section">
        <div class="alarm-settings-header">🔔 提醒设置</div>

        <div class="setting-item">
          <label>铃声选择</label>
          <select id="alarmSound" class="alarm-select">
            <option value="classic">经典提示音</option>
            <option value="bright">清脆铃声</option>
            <option value="digital">电子闹钟</option>
            <option value="soft">柔和提醒</option>
          </select>
          <button class="btn-preview" id="btnPreview">🔊 试听</button>
        </div>

        <div class="setting-item">
          <label>音量 <span id="volumeLabel">70%</span></label>
          <input type="range" id="alarmVolume" min="0" max="100" value="70" step="5">
        </div>

        <div class="setting-item setting-row">
          <label>持续响铃</label>
          <label class="switch-label">
            <input type="checkbox" id="alarmContinuous" checked>
            <span class="switch-track"></span>
          </label>
        </div>

        <div class="setting-item">
          <label>延时时长 <span id="snoozeMinutesValue">9 分钟</span></label>
          <input type="range" id="snoozeMinutes" min="1" max="20" value="9" step="1">
        </div>
      </div>
    </div>

    <!-- ── Task panel ───────────────────────────────────────────── -->
    <div class="task-section" id="taskSection">
      <div class="task-input-row">
        <input type="text" class="task-input" id="taskInput"
               placeholder="添加任务..." maxlength="120">
        <select class="task-pomo-select" id="taskEstimatedPomos" title="预估番茄数">
          <option value="1">1🍅</option>
          <option value="2">2🍅</option>
          <option value="3">3🍅</option>
          <option value="4">4🍅</option>
          <option value="5">5🍅</option>
          <option value="6">6🍅</option>
          <option value="7">7🍅</option>
          <option value="8">8🍅</option>
        </select>
        <button class="task-btn-add" id="btnTaskAdd" title="添加任务">＋</button>
      </div>
      <div class="task-list" id="taskList"></div>
      <div class="task-active-badge" id="taskActiveBadge" style="display:none">
        📌 当前任务：<span id="taskActiveName"></span>
        <button class="task-active-clear" id="btnTaskClearActive">✕</button>
      </div>
    </div>

    <!-- ── Stats & History tabs ─────────────────────────────────── -->
    <div class="bottom-section" id="bottomSection">
      <div class="bottom-tabs">
        <button class="bottom-tab active" data-tab="stats">📊 统计</button>
        <button class="bottom-tab" data-tab="history">📋 记录</button>
      </div>

      <!-- Stats panel -->
      <div class="stats-panel" id="statsPanel">
        <div class="streak-display" id="streakDisplay">
          <span class="streak-fire">🔥</span>
          <span class="streak-count" id="streakCount">0</span>
          <span class="streak-label">天连续专注</span>
        </div>
        <div class="stats-summary" id="statsSummary">
          <div class="stats-summary-item">
            <span class="stats-summary-value" id="weeklyTotalHours">0</span>
            <span class="stats-summary-label">本周专注小时</span>
          </div>
          <div class="stats-summary-item">
            <span class="stats-summary-value" id="weeklyTotalPomos">0</span>
            <span class="stats-summary-label">本周番茄数</span>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="weeklyChart" height="180"></canvas>
        </div>
      </div>

      <!-- History panel -->
      <div class="history-panel" id="historyPanel" style="display:none">
        <div class="history-list" id="historyList"></div>
      </div>
    </div>
  </div>

  <!-- ── Alarm overlay popup ────────────────────────────────────── -->
  <div class="alarm-overlay" id="alarmOverlay" style="display:none">
    <div class="alarm-card">
      <!-- Alert animation video (alert-rest.mp4 or alert-work.mp4) -->
      <div class="alarm-card-video-wrap">
        <video
          class="alarm-card-video"
          id="alarmCardVideo"
          autoplay loop muted playsinline
          src=""
        ></video>
      </div>
      <!-- Small context subtitle (does not overlap video text) -->
      <div class="alarm-card-subtitle" id="alarmCardSubtitle"></div>
      <div class="alarm-card-buttons">
        <button class="alarm-btn alarm-btn-dismiss" id="btnAlarmDismiss">
          关闭提醒
        </button>
        <button class="alarm-btn alarm-btn-snooze" id="btnAlarmSnooze">
          延时 9 分钟
        </button>
      </div>
    </div>
  </div>

  <script src="sounds.js"></script>
  <script src="avatar.js"></script>
  <script src="../node_modules/chart.js/dist/chart.umd.js"></script>
  <script src="stats.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
